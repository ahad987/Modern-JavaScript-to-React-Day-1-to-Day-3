<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 Exam</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="card">
        <h2>Discount Calculator</h2>
        <label for="priceInput">Enter Original Price:</label>
        <input type="number" id="priceInput" min="0" placeholder="Enter price here">
        
        <button onclick="calculateDiscount()">Calculate Discount</button>
        <div class="result" id="discountResult"></div>
    </div>

    <script>
        function calculateDiscount(){
            let price = Number(document.getElementById('priceInput').value);
            let discount = 0;

            if(price >= 5000){
                discount = price * 0.20; // 20% discount
            } else if(price >= 3000){
                discount = price * 0.10; // 10% discount
            } else if(price >= 2000){
                discount = price * 0.05; // 5% discount
            } else {
                discount = 0; // No discount
            }
            document.getElementById('discountResult').innerHTML =
             `<h3>Original Price: $${price.toFixed(2)}</h3>
             <h4>Discount: $${discount.toFixed(2)}</h4>
             <h2>Final Price: $${(price - discount).toFixed(2)}</h2>`;
        }
    </script>
    
</body>
</html>
