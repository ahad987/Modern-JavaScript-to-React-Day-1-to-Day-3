<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Day 2</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="card">
        <h2>Grade Calculator</h2>
        <label for="marksInput">Enter Marks: (0 - 100)</label>
        <input type="number" id="marksInput" min="0" max="100" placeholder="Enter marks here">
        <button onclick="calculateGrade()">Calculate Grade</button>
         <!-- <input type="submit" value="Calculate Grade" onclick="calculateGrade()"> -->
        <div class="result" id="gradeResult"></div>
    </div>

    <script>
        function calculateGrade() {
            // ইনপুট ভ্যালু নেওয়া এবং সেটি সংখ্যায় (Number) রূপান্তর করা
            let marks = Number(document.getElementById('marksInput').value);
            let gread = '';

            // Comparison এবং Logical অপারেটর ব্যবহার করে কন্ডিশন চেক
            if (marks >= 80 && marks <= 100) {
                gread = 'A+';
            } else if (marks >= 70 && marks < 80) {
                gread = 'A';
            } else if (marks >= 60 && marks < 70) {
                gread = 'A-';
            } else if (marks >= 50 && marks < 60) {
                gread = 'B';
            } else if (marks >= 40 && marks < 50) {
                gread = 'C';
            } else if (marks >= 33 && marks < 40) {
                gread = 'D';
            } else if (marks >= 0 && marks < 33) {
                gread = 'F (FAIL)';
            } else {
                gread = 'Invalid marks entered. Please enter a value between 0 and 100.';
            }

            // Result দেখানো
            // document.getElementById('gradeResult').textContent = `Grade: ${gread}`;
            document.getElementById('gradeResult').innerHTML = `<h3>Grade: ${gread}</h3>`;
        }

    </script>
</body>

</html>
